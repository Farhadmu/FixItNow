$kind: http-request
url: "{{baseUrl}}/technician/availability/me"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{technicianToken}}
body:
  type: text
  content: |-
    {
      "slots": [
        { "dayOfWeek": 1, "startTime": "09:00", "endTime": "17:00" },
        { "dayOfWeek": 2, "startTime": "09:00", "endTime": "17:00" }
      ]
    }
order: 4000
